<!DOCTYPE html>
<html>
<head>
  <title>Evil AI</title>
</head>
<body style="background:black;color:#00ff66;font-family:Arial;padding:20px;">

<h1>EVIL AI</h1>

<div id="status">Laddar AI...</div>

<div id="chat" style="
height:300px;
overflow:auto;
border:1px solid #00ff66;
padding:10px;
margin-top:10px;
margin-bottom:10px;
"></div>

<input id="input" placeholder="Skriv..." style="
width:70%;
padding:10px;
background:black;
color:#00ff66;
border:1px solid #00ff66;
">

<button id="sendBtn">Skicka</button>

<script type="module">

import { CreateMLCEngine }
from "https://esm.run/@mlc-ai/web-llm";

const status = document.getElementById("status");
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let engine;

async function loadAI() {

  try {

    engine = await CreateMLCEngine(
      "Llama-3.2-1B-Instruct-q4f16_1-MLC"
    );

    status.innerText = "AI redo.";

    sendBtn.disabled = false;

  } catch (err) {

    console.error(err);

    status.innerText =
      "AI kunde inte laddas.";

  }

}

sendBtn.disabled = true;

loadAI();

sendBtn.onclick = async () => {

  const text = input.value;

  if (!text) return;

  chat.innerHTML += `
    <p><b>Du:</b> ${text}</p>
  `;

  input.value = "";

  chat.innerHTML += `
    <p id="thinking" style="color:red;">
      EVIL AI tänker...
    </p>
  `;

  const response =
    await engine.chat.completions.create({

      messages: [
        {
          role: "system",
          content: `
Du är en evil AI.
Du är kall, creepy och mystisk.
`
        },
        {
          role: "user",
          content: text
        }
      ]

    });

  document.getElementById("thinking").remove();

  chat.innerHTML += `
    <p style="color:red;">
      <b>EVIL AI:</b>
      ${response.choices[0].message.content}
    </p>
  `;

};

</script>

</body>
</html>
