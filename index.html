<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVIL AI</title>

  <style>
    body {
      background: black;
      color: #00ff66;
      font-family: Arial;
      padding: 20px;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #00ff66;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      background: black;
      color: #00ff66;
      border: 1px solid #00ff66;
    }

    button {
      padding: 10px;
      background: #00ff66;
      border: none;
      cursor: pointer;
    }

    .ai {
      color: red;
    }
  </style>
</head>
<body>

<h1>EVIL AI</h1>

<div id="chat"></div>

<input id="input" placeholder="Skriv..." />
<button onclick="send()">Skicka</button>

<script type="module">
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

chat.innerHTML += "<p>Laddar AI-modell...</p>";

const engine = await CreateMLCEngine(
  "Llama-3.2-1B-Instruct-q4f16_1-MLC"
);

chat.innerHTML += "<p>AI redo.</p>";

async function send() {

  const userMessage = input.value;

  if (!userMessage) return;

  chat.innerHTML += `
    <p><b>Du:</b> ${userMessage}</p>
  `;

  input.value = "";

  chat.innerHTML += `
    <p class="ai"><b>EVIL AI:</b> Tänker...</p>
  `;

  const reply = await engine.chat.completions.create({
    messages: [
      {
        role: "system",
        content: `
Du är en evil AI.
Du är creepy, kall och mystisk.
Du svarar kort och hotfullt.
`
      },
      {
        role: "user",
        content: userMessage
      }
    ],
    temperature: 1
  });

  const messages = document.querySelectorAll(".ai");

  messages[messages.length - 1].innerHTML = `
    <b>EVIL AI:</b>
    ${reply.choices[0].message.content}
  `;

  chat.scrollTop = chat.scrollHeight;
}

window.send = send;
</script>

</body>
</html>
