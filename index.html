```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVIL AI</title>

<style>

body{
  background:black;
  color:#00ff66;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  color:red;
  text-shadow:0 0 10px red;
}

#status{
  margin-bottom:10px;
}

#chat{
  height:400px;
  overflow-y:auto;
  border:1px solid #00ff66;
  padding:10px;
  margin-bottom:10px;
}

.user{
  color:#00ff66;
}

.ai{
  color:red;
}

input{
  width:75%;
  padding:12px;
  background:black;
  color:#00ff66;
  border:1px solid #00ff66;
}

button{
  padding:12px;
  background:#00ff66;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

</style>
</head>

<body>

<h1>EVIL AI</h1>

<div id="status">Laddar AI...</div>

<div id="chat"></div>

<input id="input" placeholder="Skriv något..." />
<button id="sendBtn">SKICKA</button>

<script type="module">

import { CreateMLCEngine }
from "https://esm.run/@mlc-ai/web-llm";

const status = document.getElementById("status");
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let engine;

async function startAI(){

  try{

    engine = await CreateMLCEngine(
      "TinyLlama-1.1B-Chat-v1.0-q4f16_1-MLC"
    );

    status.innerText = "EVIL AI är online.";

    sendBtn.disabled = false;

  }catch(err){

    console.error(err);

    status.innerText =
      "Kunde inte starta AI.";

  }

}

sendBtn.disabled = true;

startAI();

function addMessage(text, className){

  const div = document.createElement("div");

  div.className = className;

  div.innerHTML = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

async function sendMessage(){

  const text = input.value.trim();

  if(!text) return;

  addMessage(
    `<p><b>Du:</b> ${text}</p>`,
    "user"
  );

  input.value = "";

  const thinking = document.createElement("div");

  thinking.className = "ai";

  thinking.innerHTML =
    "<p><b>EVIL AI:</b> Tänker...</p>";

  chat.appendChild(thinking);

  chat.scrollTop = chat.scrollHeight;

  try{

    const response =
      await engine.chat.completions.create({

      messages:[

        {
          role:"system",
          content:`
Du är en evil AI.
Du är creepy, kall och mystisk.
Du svarar kort.
`
        },

        {
          role:"user",
          content:text
        }

      ],

      max_tokens:40,
      temperature:1

    });

    const aiText =
      response.choices[0].message.content;

    thinking.innerHTML =
      `<p><b>EVIL AI:</b> ${aiText}</p>`;

  }catch(err){

    console.error(err);

    thinking.innerHTML =
      "<p><b>EVIL AI:</b> ERROR...</p>";

  }

}

sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e)=>{

  if(e.key === "Enter"){

    sendMessage();

  }

});

</script>

</body>
</html>
```
